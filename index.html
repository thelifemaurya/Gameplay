<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency | GLB Build</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; color: white; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #start-btn { padding: 15px 40px; background: transparent; color: #888; border: 1px solid #444; cursor: pointer; font-size: 18px; letter-spacing: 2px; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 50%; z-index: 20; visibility: hidden; }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #444; border-radius: 50%; }
        #ui-text { position: absolute; top: 20px; width: 100%; text-align: center; color: #666; z-index: 10; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color:#444; margin-bottom:30px; letter-spacing: 5px;">DEAD FREQUENCY</h2>
        <button id="start-btn">AANKHEIN KHOLO</button>
    </div>

    <div id="ui-text">Loading building... (Wait 2-3 seconds)</div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
    let scene, camera, renderer, audioCtx;
    let yaw = 0, pitch = 0, inputX = 0, inputY = 0;
    let lookTouchID = null, moveTouchID = null, prevLookX, prevLookY;

    document.getElementById('start-btn').onclick = function() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('joy-base').style.visibility = 'visible';
        
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        initGame();
        playHorrorAmbience();
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        
        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Position character inside the building (adjust if you are under the floor)
        camera.position.set(0, 1.6, 5); 

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping; // Better lighting for GLB
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- LOAD YOUR GLB BUILDING ---
        const loader = new THREE.GLTFLoader();
        loader.load('building.glb', function(gltf) {
            const model = gltf.scene;
            scene.add(model);
            document.getElementById('ui-text').innerText = "Arjun... Utho.";
            console.log("Model loaded!");
        }, undefined, function(error) {
            console.error("Error loading GLB:", error);
            document.getElementById('ui-text').innerText = "Model Load Nahi Hua! File check karo.";
        });

        // --- LIGHTING (Essential for GLB) ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.3)); // Thodi base light
        const flashlight = new THREE.PointLight(0xffffff, 1.5, 20); // Player's light
        camera.add(flashlight);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) moveTouchID = t.identifier;
                else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    yaw -= (t.clientX - prevLookX) * 0.005;
                    pitch -= (t.clientY - prevLookY) * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) { moveTouchID = null; inputX = 0; inputY = 0; knob.style.transform = 'translate(0,0)'; }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function playHorrorAmbience() {
        // Geiger Sound (Tik-Tik)
        setInterval(() => {
            if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(140, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.015, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.03);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.03);
        }, 2600);

        // Meera's Sequence
        const voices = ['meera_1.mp3', 'meera_2.mp3', 'meera_3.mp3', 'meera_4.mp3'];
        let current = 0;
        function playNext() {
            if (current >= voices.length) return;
            const audio = new Audio(voices[current]);
            audio.play().catch(() => {});
            audio.onended = () => { current++; setTimeout(playNext, 6000); };
        }
        playNext();
    }

    function animate() {
        requestAnimationFrame(animate);
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            camera.position.addScaledVector(forward, -inputY * 0.15);
            camera.position.addScaledVector(right, inputX * 0.15);
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
