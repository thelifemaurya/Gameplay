<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency | Bedroom</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; color: white; }
        
        /* Start Screen - Very Important for Sound & 3D */
        #start-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050505; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        #start-btn {
            padding: 15px 40px; background: transparent; color: #888;
            border: 1px solid #444; font-family: inherit; cursor: pointer;
            font-size: 18px; letter-spacing: 2px;
        }

        #rotate-notice {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
        }
        @media (orientation: portrait) { #rotate-notice { display: flex; } }

        #joy-base { 
            position: absolute; bottom: 30px; left: 30px; 
            width: 100px; height: 100px; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; border-radius: 50%; z-index: 20; visibility: hidden;
        }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #444; border-radius: 50%; }
        
        #ui-text { position: absolute; top: 20px; width: 100%; text-align: center; color: #444; z-index: 10; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color:#444; margin-bottom:30px;">DEAD FREQUENCY</h2>
        <button id="start-btn">AANKHEIN KHOLO</button>
        <p style="font-size:10px; color:#222; margin-top:20px;">Use Headphones for Atmosphere</p>
    </div>

    <div id="rotate-notice">
        <div style="font-size: 20px;">🔄 ROTATE PHONE</div>
    </div>

    <div id="ui-text">Arjun... Meera kitchen mein hai.</div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, audioCtx;
    let yaw = 0, pitch = 0, inputX = 0, inputY = 0;
    let lookTouchID = null, moveTouchID = null, prevLookX, prevLookY;

    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const joyBase = document.getElementById('joy-base');

    startBtn.onclick = () => {
        startScreen.style.display = 'none';
        joyBase.style.visibility = 'visible';
        initGame();
        startGeiger();
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x010101);
        scene.fog = new THREE.Fog(0x000000, 1, 10);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // BEDROOM BOX (More visible for testing)
        const roomGeo = new THREE.BoxGeometry(10, 4, 10);
        const roomMat = new THREE.MeshStandardMaterial({ color: 0x221a15, side: THREE.BackSide });
        const bedroom = new THREE.Mesh(roomGeo, roomMat);
        scene.add(bedroom);

        // GRID (Halka rakhte hain taaki andhera na lage)
        const grid = new THREE.GridHelper(10, 10, 0x333333, 0x222222);
        grid.position.y = -2;
        scene.add(grid);

        // LIGHTS
        const ambient = new THREE.AmbientLight(0xffffff, 0.1); 
        scene.add(ambient);

        const torch = new THREE.PointLight(0xffffff, 1.5, 12);
        camera.add(torch);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) {
                    moveTouchID = t.identifier;
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;

            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    let dx = t.clientX - prevLookX, dy = t.clientY - prevLookY;
                    yaw -= dx * 0.005; pitch -= dy * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    moveTouchID = null; inputX = 0; inputY = 0;
                    knob.style.transform = `translate(0px,0px)`;
                }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function startGeiger() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        setInterval(() => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.01);
        }, 2500);
    }

    function animate() {
        requestAnimationFrame(animate);
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            camera.position.addScaledVector(forward, -inputY * 0.1);
            camera.position.addScaledVector(right, inputX * 0.1);
        }
        renderer.render(scene, camera);
    }

    window.onresize = () => {
        if(renderer) {
            renderer.setSize(window.innerWidth, window.innerHeight);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
        }
    };
</script>
</body>
</html>
