<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency - Optimized 3D</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        
        /* Orientation Overlay */
        #rotate-notice {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: white; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999; text-align: center;
        }
        @media (orientation: landscape) { #rotate-notice { display: none; } }

        #game-container {
            position: relative; width: 100vw; height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        /* UI Elements */
        #joy-base { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 100px; height: 100px; background: rgba(255,255,255,0.05); 
            border: 1px solid #333; border-radius: 50%; z-index: 10;
        }
        #joy-knob { 
            position: absolute; top: 25px; left: 25px; 
            width: 50px; height: 50px; background: #444; border-radius: 50%; 
        }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div style="font-size: 24px; margin-bottom: 10px;">🔄 Please Rotate Your Phone</div>
        <p>Behtar experience ke liye Landscape mode (16:9) use karein.</p>
    </div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer;
    let yaw = 0, pitch = 0; // Proper Euler Angles for rotation
    let moveX = 0, moveZ = 0;
    let lookTouchID = null, moveTouchID = null;
    let prevLookX, prevLookY;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x000000, 1, 20);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Grid aur environment
        scene.add(new THREE.GridHelper(100, 50, 0x222222, 0x111111));
        const light = new THREE.PointLight(0xffffff, 2, 10);
        camera.add(light);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');
        const centerX = base.offsetLeft + 50;
        const centerY = base.offsetTop + 50;

        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                // Agar touch left side hai (Movement)
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) {
                    moveTouchID = t.identifier;
                } 
                // Agar touch right side hai (Look/Rotation)
                else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX;
                    prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];

                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX;
                    let dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    moveX = Math.cos(angle) * (dist / 40);
                    moveZ = Math.sin(angle) * (dist / 40);
                }

                if (t.identifier === lookTouchID) {
                    let dx = t.clientX - prevLookX;
                    let dy = t.clientY - prevLookY;
                    
                    // SENSITIVITY FIX: Rotation diagonal problem yahan solve hoti hai
                    yaw -= dx * 0.004; 
                    pitch -= dy * 0.004;
                    pitch = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, pitch));
                    
                    prevLookX = t.clientX;
                    prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === moveTouchID) {
                    moveTouchID = null; moveX = 0; moveZ = 0;
                    knob.style.transform = `translate(0px,0px)`;
                }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        // Rotation Fix using Euler math
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        // Movement Fix (Diagonal World-Space)
        if (moveX !== 0 || moveZ !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            camera.position.addScaledVector(forward, -moveZ * 0.1);
            camera.position.addScaledVector(right, moveX * 0.1);
        }

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    };

    init();
</script>
</body>
</html>
