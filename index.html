<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dead Frequency 3D Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #444; font-family: monospace; pointer-events: none; }
        
        /* Joystick visual */
        #joystick-container { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 100px; height: 100px; background: rgba(255,255,255,0.05); 
            border: 2px solid #333; border-radius: 50%; touch-action: none;
        }
        #joystick-knob { 
            position: absolute; top: 30px; left: 30px; 
            width: 40px; height: 40px; background: #444; border-radius: 50%; 
        }
    </style>
</head>
<body>

    <div id="ui">Halka sa swipe karo dekhne ke liye...</div>
    
    <div id="joystick-container">
        <div id="joystick-knob"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, moveForward = false;
    let lon = 0, lat = 0, phi = 0, theta = 0;
    let touchX, touchY;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 5);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Zameen (Floor) - Taaki andhere mein pata chale movement
        const grid = new THREE.GridHelper(100, 50, 0x222222, 0x111111);
        scene.add(grid);

        // Light - Ek halki torch jaisi light player ke paas
        const light = new THREE.PointLight(0xffffff, 1, 10);
        camera.add(light);
        scene.add(camera);

        animate();
    }

    // --- TOUCH CONTROLS (Camera Look) ---
    document.addEventListener('touchstart', (e) => {
        if(e.target.id !== "joystick-knob") {
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        }
    });

    document.addEventListener('touchmove', (e) => {
        if(e.target.id !== "joystick-knob") {
            let dx = e.touches[0].clientX - touchX;
            let dy = e.touches[0].clientY - touchY;
            lon -= dx * 0.2;
            lat += dy * 0.2;
            lat = Math.max(-85, Math.min(85, lat));
            touchX = e.touches[0].clientX;
            touchY = e.touches[0].clientY;
        }
    });

    // --- JOYSTICK (Movement) ---
    const knob = document.getElementById('joystick-knob');
    knob.ontouchstart = () => { moveForward = true; knob.style.background = "#888"; };
    knob.ontouchend = () => { moveForward = false; knob.style.background = "#444"; };

    function animate() {
        requestAnimationFrame(animate);

        // Camera Direction Logic
        phi = THREE.MathUtils.degToRad(90 - lat);
        theta = THREE.MathUtils.degToRad(lon);
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        // Simple Move Forward
        if (moveForward) {
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            camera.position.addScaledVector(direction, 0.05);
            camera.position.y = 1.6; // Keep height constant
        }

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
