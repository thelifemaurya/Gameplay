<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency - The Bedroom</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        #rotate-notice { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; text-align: center; }
        @media (orientation: landscape) { #rotate-notice { display: none; } }
        #game-ui { position: absolute; top: 20px; width: 100%; text-align: center; color: #666; pointer-events: none; z-index: 10; font-size: 14px; }
        #joy-base { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; z-index: 20; }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #444; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div style="font-size: 24px; margin-bottom: 10px;">🔄 Rotate Phone</div>
        <p>Landscape mode mein hi maza aayega.</p>
    </div>

    <div id="game-ui">Arjun... Aankhein Kholo.</div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, audioStarted = false;
    let yaw = 0, pitch = 0, inputX = 0, inputY = 0;
    let lookTouchID = null, moveTouchID = null, prevLookX, prevLookY;

    // 1. GAME SETUP (DEEWAREIN, LIGHTS, SOUND)
    function startEngine() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 10);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 3); // Player position

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // BEDROOM BOX (Walls, Floor, Ceiling)
        const roomGeo = new THREE.BoxGeometry(10, 4, 10);
        const roomMat = new THREE.MeshStandardMaterial({ color: 0x1a1510, side: THREE.BackSide });
        const bedroom = new THREE.Mesh(roomGeo, roomMat);
        scene.add(bedroom);

        // TARA'S DRAWING (Safed paper deewar par)
        const paperGeo = new THREE.PlaneGeometry(0.6, 0.8);
        const paperMat = new THREE.MeshBasicMaterial({ color: 0xeeeeee });
        const paper = new THREE.Mesh(paperGeo, paperMat);
        paper.position.set(-4.98, 1.5, 0); // Left wall
        paper.rotation.y = Math.PI / 2;
        scene.add(paper);

        // LIGHTS
        const ambient = new THREE.AmbientLight(0x404040, 0.2); // Boht halki roshni
        scene.add(ambient);

        const torch = new THREE.SpotLight(0xffffff, 2, 10, Math.PI/6, 0.5);
        camera.add(torch);
        camera.add(torch.target);
        torch.target.position.set(0, 0, -1);
        scene.add(camera);

        setupControls();
        animate();
    }

    // 2. CONTROLS (LOOK & MOVE)
    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            // Audio start karne ke liye (Browser safety)
            if(!audioStarted) { startGeiger(); audioStarted = true; }

            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) {
                    moveTouchID = t.identifier;
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;

            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    let dx = t.clientX - prevLookX, dy = t.clientY - prevLookY;
                    yaw -= dx * 0.005; pitch -= dy * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    moveTouchID = null; inputX = 0; inputY = 0;
                    knob.style.transform = `translate(0px,0px)`;
                }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    // 3. SOUND (GEIGER TICK)
    function startGeiger() {
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        setInterval(() => {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.01);
        }, 3000);
    }

    // 4. ANIMATION LOOP
    function animate() {
        requestAnimationFrame(animate);
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            camera.position.addScaledVector(forward, -inputY * 0.1);
            camera.position.addScaledVector(right, inputX * 0.1);
        }
        renderer.render(scene, camera);
    }

    window.onload = startEngine;
</script>
</body>
</html>
