<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dead Frequency 3D - Final Controls</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: #444; font-family: monospace; pointer-events: none; z-index: 10; }
        #joy-base { position: absolute; bottom: 50px; left: 50px; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; touch-action: none; }
        #joy-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: #555; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="ui">Diagonal Movement Fixed. Try North-East now!</div>
    <div id="joy-base"><div id="joy-knob"></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer;
    let lon = 0, lat = 0, touchX, touchY;
    let inputX = 0, inputY = 0;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x000000, 1, 20);

        camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(200, 100, 0x222222, 0x111111));
        
        const light = new THREE.PointLight(0xffffff, 2, 10);
        camera.add(light);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');
        const centerX = base.offsetLeft + 60;
        const centerY = base.offsetTop + 60;

        // --- LOOK (Right Half) ---
        document.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX > window.innerWidth / 2) {
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            }
        });

        document.addEventListener('touchmove', (e) => {
            for(let i=0; i<e.touches.length; i++) {
                if(e.touches[i].clientX > window.innerWidth / 2) {
                    let dx = e.touches[i].clientX - touchX;
                    let dy = e.touches[i].clientY - touchY;
                    lon += dx * 0.25;
                    lat -= dy * 0.25;
                    lat = Math.max(-85, Math.min(85, lat));
                    touchX = e.touches[i].clientX;
                    touchY = e.touches[i].clientY;
                }
            }
        });

        // --- MOVE (Left Half / Joystick) ---
        base.addEventListener('touchmove', (e) => {
            e.preventDefault();
            let t = e.touches[0];
            let dx = t.clientX - centerX;
            let dy = t.clientY - centerY;
            let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 50);
            let angle = Math.atan2(dy, dx);

            knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
            
            // Raw Inputs
            inputX = Math.cos(angle) * (dist / 50);
            inputY = Math.sin(angle) * (dist / 50);
        });

        base.addEventListener('touchend', () => {
            knob.style.transform = `translate(0px, 0px)`;
            inputX = 0; inputY = 0;
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        lon = lon % 360;
        let phi = THREE.MathUtils.degToRad(90 - lat);
        let theta = THREE.MathUtils.degToRad(lon);
        
        const target = new THREE.Vector3();
        target.setFromSphericalCoords(1, phi, theta).add(camera.position);
        camera.lookAt(target);

        if (inputX !== 0 || inputY !== 0) {
            // Calculate direction vectors
            const forward = new THREE.Vector3();
            camera.getWorldDirection(forward);
            forward.y = 0; forward.normalize();
            
            const right = new THREE.Vector3();
            right.crossVectors(forward, camera.up).negate().normalize(); // Corrected Right Vector

            // Combine for Smooth Diagonal Movement
            const moveVec = new THREE.Vector3();
            moveVec.addScaledVector(forward, -inputY * 0.1);
            moveVec.addScaledVector(right, inputX * 0.1);
            
            camera.position.add(moveVec);
        }

        renderer.render(scene, camera);
    }

    window.onload = init;
</script>
</body>
</html>
