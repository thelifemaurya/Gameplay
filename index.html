<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency - Final Movement Fix</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; }
        #rotate-notice { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; text-align: center; }
        @media (orientation: landscape) { #rotate-notice { display: none; } }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        #joy-base { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 2px solid #333; border-radius: 50%; z-index: 10; }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #555; border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>

    <div id="rotate-notice">
        <div style="font-size: 24px; margin-bottom: 10px;">🔄 Please Rotate Your Phone</div>
        <p>Landscape mode (16:9) mein hi maza aayega.</p>
    </div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer;
    let yaw = 0, pitch = 0; 
    let inputX = 0, inputY = 0; // Joystick values
    let lookTouchID = null, moveTouchID = null;
    let prevLookX, prevLookY;

    function init() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020202);
        scene.fog = new THREE.Fog(0x000000, 1, 20);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Performance optimization
        document.getElementById('game-container').appendChild(renderer.domElement);

        scene.add(new THREE.GridHelper(100, 60, 0x333333, 0x111111));
        const light = new THREE.PointLight(0xffffff, 2, 12);
        camera.add(light);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) {
                    moveTouchID = t.identifier;
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;

            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    
                    // Normalizing input for smooth diagonal
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    let dx = t.clientX - prevLookX, dy = t.clientY - prevLookY;
                    yaw -= dx * 0.005; pitch -= dy * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    moveTouchID = null; inputX = 0; inputY = 0;
                    knob.style.transform = `translate(0px,0px)`;
                }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function animate() {
        requestAnimationFrame(animate);

        // Update Rotation
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        // Update Movement (Relative to where you look)
        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            
            // Final Vector Calculation
            const moveVec = new THREE.Vector3();
            moveVec.addScaledVector(forward, -inputY * 0.12);
            moveVec.addScaledVector(right, inputX * 0.12);
            camera.position.add(moveVec);
        }

        renderer.render(scene, camera);
    }

    window.onresize = () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
    };

    init();
</script>
</body>
</html>
