<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency | Fixed Build</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; color: white; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #start-btn { padding: 15px 40px; background: transparent; color: #888; border: 1px solid #444; cursor: pointer; font-size: 18px; letter-spacing: 2px; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 50%; z-index: 20; visibility: hidden; }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #444; border-radius: 50%; }
        #ui-text { position: absolute; top: 20px; width: 100%; text-align: center; color: #666; z-index: 10; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color:#444; margin-bottom:30px; letter-spacing: 5px;">DEAD FREQUENCY</h2>
        <button id="start-btn">AANKHEIN KHOLO</button>
    </div>

    <div id="ui-text">Arjun... Meera kitchen mein hai.</div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, audioCtx;
    let yaw = 0, pitch = 0, inputX = 0, inputY = 0;
    let lookTouchID = null, moveTouchID = null, prevLookX, prevLookY;
    const LIMIT = 9.4; 

    document.getElementById('start-btn').onclick = function() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('joy-base').style.visibility = 'visible';
        
        // Setup Audio Context immediately on click
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();

        initGame();
        playHorrorAmbience();
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x050505);
        scene.fog = new THREE.Fog(0x000000, 1, 18);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // --- WALLS FIX ---
        // Humne color thoda light kiya hai aur side ko DoubleSide kiya hai taaki wo invisible na rahe
        const roomGeo = new THREE.BoxGeometry(20, 10, 20);
        const roomMat = new THREE.MeshStandardMaterial({ 
            color: 0x222222, 
            side: THREE.DoubleSide,
            roughness: 1
        });
        const bedroom = new THREE.Mesh(roomGeo, roomMat);
        scene.add(bedroom);

        // Floor Grid
        const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
        grid.position.y = -0.05;
        scene.add(grid);

        // --- LIGHTING FIX ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.05)); // Base visibility
        
        // Flashlight attached to camera
        const torch = new THREE.PointLight(0xffffff, 1.5, 12);
        camera.add(torch);
        scene.add(camera);

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) moveTouchID = t.identifier;
                else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    yaw -= (t.clientX - prevLookX) * 0.005;
                    pitch -= (t.clientY - prevLookY) * 0.005;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) { moveTouchID = null; inputX = 0; inputY = 0; knob.style.transform = 'translate(0,0)'; }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function playHorrorAmbience() {
        // --- TIK TIK FIX ---
        function triggerTik() {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            
            osc.type = 'square'; // Sharper "tik" sound
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.02, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.02);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.02);
        }

        setInterval(triggerTik, 2500);

        // Meera's Sequence
        const voices = ['meera_1.mp3', 'meera_2.mp3', 'meera_3.mp3', 'meera_4.mp3'];
        let current = 0;
        function playNext() {
            if (current >= voices.length) return;
            const audio = new Audio(voices[current]);
            audio.play().catch(e => console.log("Audio Error:", voices[current]));
            audio.onended = () => { current++; setTimeout(playNext, 6000); };
        }
        playNext();
    }

    function animate() {
        requestAnimationFrame(animate);
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            let nextX = camera.position.x + (forward.x * -inputY * 0.1) + (right.x * inputX * 0.1);
            let nextZ = camera.position.z + (forward.z * -inputY * 0.1) + (right.z * inputX * 0.1);
            
            // Collision logic
            if (Math.abs(nextX) < LIMIT) camera.position.x = nextX;
            if (Math.abs(nextZ) < LIMIT) camera.position.z = nextZ;
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
