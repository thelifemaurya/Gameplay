<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Dead Frequency | Bedroom Scene</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Courier New', monospace; touch-action: none; color: white; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
        #start-btn { padding: 15px 40px; background: transparent; color: #888; border: 1px solid #444; cursor: pointer; font-size: 18px; letter-spacing: 2px; }
        #rotate-notice { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 999; }
        @media (orientation: portrait) { #rotate-notice { display: flex; } }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 50%; z-index: 20; visibility: hidden; }
        #joy-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: #333; border-radius: 50%; }
        #ui-text { position: absolute; top: 20px; width: 100%; text-align: center; color: #444; z-index: 10; font-size: 14px; pointer-events: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <h2 style="color:#333; margin-bottom:30px; letter-spacing: 5px;">DEAD FREQUENCY</h2>
        <button id="start-btn">AANKHEIN KHOLO</button>
    </div>

    <div id="rotate-notice"><div>🔄 ROTATE DEVICE</div></div>
    <div id="ui-text">Arjun... Meera kitchen mein hai.</div>

    <div id="game-container">
        <div id="joy-base"><div id="joy-knob"></div></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    let scene, camera, renderer, audioCtx;
    let yaw = 0, pitch = 0, inputX = 0, inputY = 0;
    let lookTouchID = null, moveTouchID = null, prevLookX, prevLookY;
    const LIMIT = 9.4; 

    const startBtn = document.getElementById('start-btn');
    const startScreen = document.getElementById('start-screen');
    const joyBase = document.getElementById('joy-base');

    startBtn.onclick = () => {
        startScreen.style.display = 'none';
        joyBase.style.visibility = 'visible';
        initGame();
        playHorrorAmbience();
    };

    function initGame() {
        scene = new THREE.Scene();
        scene.background = new THREE.Color(0x000000);
        scene.fog = new THREE.Fog(0x000000, 1, 15);

        camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 0);

        renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('game-container').appendChild(renderer.domElement);

        // Bedroom Box
        const roomGeo = new THREE.BoxGeometry(20, 8, 20);
        const roomMat = new THREE.MeshStandardMaterial({ color: 0x1a1510, side: THREE.BackSide });
        scene.add(new THREE.Mesh(roomGeo, roomMat));

        // Floor
        const grid = new THREE.GridHelper(20, 20, 0x222222, 0x111111);
        grid.position.y = -0.01;
        scene.add(grid);

        // Flashlight
        const torch = new THREE.SpotLight(0xffffff, 2, 15, Math.PI/6, 0.5);
        camera.add(torch);
        camera.add(torch.target);
        torch.target.position.set(0, 0, -1);
        scene.add(camera);
        scene.add(new THREE.AmbientLight(0xffffff, 0.02));

        setupControls();
        animate();
    }

    function setupControls() {
        const base = document.getElementById('joy-base');
        const knob = document.getElementById('joy-knob');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchID === null) moveTouchID = t.identifier;
                else if (t.clientX >= window.innerWidth / 2 && lookTouchID === null) {
                    lookTouchID = t.identifier;
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const rect = base.getBoundingClientRect();
            const centerX = rect.left + 50, centerY = rect.top + 50;
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) {
                    let dx = t.clientX - centerX, dy = t.clientY - centerY;
                    let dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
                    let angle = Math.atan2(dy, dx);
                    knob.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
                    inputX = Math.cos(angle) * (dist / 40);
                    inputY = Math.sin(angle) * (dist / 40);
                }
                if (t.identifier === lookTouchID) {
                    yaw -= (t.clientX - prevLookX) * 0.004;
                    pitch -= (t.clientY - prevLookY) * 0.004;
                    pitch = Math.max(-1.5, Math.min(1.5, pitch));
                    prevLookX = t.clientX; prevLookY = t.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchID) { moveTouchID = null; inputX = 0; inputY = 0; knob.style.transform = 'translate(0,0)'; }
                if (t.identifier === lookTouchID) lookTouchID = null;
            }
        });
    }

    function playHorrorAmbience() {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        // 1. Synthetic Geiger Tik-Tik
        setInterval(() => {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.01);
        }, 2500);

        // 2. Meera's Voice Playlist
        const voices = ['meera_1.mp3', 'meera_2.mp3', 'meera_3.mp3', 'meera_4.mp3'];
        let current = 0;

        function playNext() {
            if (current >= voices.length) return;
            const audio = new Audio(voices[current]);
            audio.play().catch(() => {});
            audio.onended = () => {
                current++;
                setTimeout(playNext, 6000); // 6 sec gap for tension
            };
        }
        playNext();
    }

    function animate() {
        requestAnimationFrame(animate);
        const qYaw = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0, 1, 0), yaw);
        const qPitch = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), pitch);
        camera.quaternion.copy(qYaw).multiply(qPitch);

        if (inputX !== 0 || inputY !== 0) {
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(qYaw);
            const right = new THREE.Vector3(1, 0, 0).applyQuaternion(qYaw);
            let nextX = camera.position.x + (forward.x * -inputY * 0.1) + (right.x * inputX * 0.1);
            let nextZ = camera.position.z + (forward.z * -inputY * 0.1) + (right.z * inputX * 0.1);
            if (Math.abs(nextX) < LIMIT) camera.position.x = nextX;
            if (Math.abs(nextZ) < LIMIT) camera.position.z = nextZ;
        }
        renderer.render(scene, camera);
    }
</script>
</body>
</html>
